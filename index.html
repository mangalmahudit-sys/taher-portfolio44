<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Senior UI/UX Portfolio</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@200;300;400;500;600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: '#070707',
            surface: '#121212',
            surfaceHover: '#1a1a1a',
            offwhite: '#E2E2E2',
            graytext: '#888888',
            accent: '#f95d13', // Burnt orange / striking vermilion
          },
          fontFamily: {
            serif: ['"Instrument Serif"', 'serif'],
            sans: ['"Manrope"', 'sans-serif'],
            display: ['"Syne"', 'sans-serif'],
          },
          backgroundImage: {
            'noise': 'url("data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E")',
          }
        }
      }
    }
  </script>
  
  <style>
    body {
      background-color: #070707;
      color: #E2E2E2;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      font-family: "Manrope", sans-serif;
      cursor: none; /* Custom Cursor */
    }
    
    a, button {
      cursor: none; /* Override defaults for custom cursor */
    }

    ::selection {
      background: #f95d13;
      color: #fff;
    }
    
    ::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }

    .noise-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.04;
      mix-blend-mode: overlay;
    }

    .glass-panel {
      background: rgba(18, 18, 18, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .text-outline {
      color: transparent;
      -webkit-text-stroke: 1px rgba(255, 255, 255, 0.2);
    }
    .text-outline-accent {
      color: transparent;
      -webkit-text-stroke: 1px #f95d13;
    }

    /* Hide scrollbar but keep functionality */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }

    /* Marquee Animation */
    @keyframes marquee {
      0% { transform: translateX(0%); }
      100% { transform: translateX(-50%); }
    }
    .animate-marquee {
      animation: marquee 20s linear infinite;
      display: flex;
      width: max-content;
    }
    .animate-marquee-reverse {
      animation: marquee 20s linear infinite reverse;
      display: flex;
      width: max-content;
    }
  </style>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Framer Motion -->
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

</head>
<body>
  <div class="noise-overlay bg-noise"></div>
  <div id="root"></div>
  
  <!-- App JS -->
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
